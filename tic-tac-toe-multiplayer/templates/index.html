<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Multiplayer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tic Tac Toe Multiplayer</h1>
            <p>Juega contra otros jugadores en tiempo real</p>
        </div>

        <div id="joinScreen" class="screen active">
            <div class="card">
                <h2>Unirse a un juego</h2>
                <input type="text" id="usernameInput" placeholder="Tu nombre" maxlength="20">
                <button class="button-primary" onclick="joinGame()">Jugar</button>
            </div>
        </div>

        <div id="waitingScreen" class="screen">
            <div class="card">
                <h2>Esperando oponente...</h2>
                <p>Eres el jugador: <strong id="yourSymbol">X</strong></p>
                <div class="loader"></div>
                <p id="roomCode">Sala: <code></code></p>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <div class="main-grid">
                <div class="card">
                    <h2>Tablero</h2>
                    <div class="game-board" id="board"></div>
                    <div class="game-status" id="gameStatus"></div>
                </div>
                <div class="card">
                    <h2>Información</h2>
                    <div class="game-info">
                        <p>Tu símbolo: <strong id="playerSymbol">X</strong></p>
                        <p>Turno de: <strong id="currentTurn">-</strong></p>
                        <div id="opponentInfo"></div>
                    </div>
                    <button class="button-primary" onclick="resetGame()" style="margin-top: 1rem; width: 100%;">Nuevo juego</button>
                    <button onclick="goBack()" style="margin-top: 0.5rem; width: 100%;">Salir</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
