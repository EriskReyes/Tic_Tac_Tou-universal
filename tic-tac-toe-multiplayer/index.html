<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tic Tac Toe</h1>
            <p>Lokaler 2-Spieler-Modus</p>
        </div>

        <!-- Startbildschirm -->
        <div id="joinScreen" class="screen active">
            <div class="card">
                <h2>Neues Spiel</h2>
                <input type="text" id="xNameInput" placeholder="Name Spieler X" maxlength="20" autocomplete="off">
                <input type="text" id="oNameInput" placeholder="Name Spieler O" maxlength="20" autocomplete="off">
                <button class="btn-primary" onclick="startGame()">Spiel Starten</button>
            </div>
        </div>

        <!-- Spielbildschirm -->
        <div id="gameScreen" class="screen">
            <!-- Punktestand -->
            <div class="scoreboard">
                <div class="player-score x-player">
                    <div class="player-avatar x">X</div>
                    <div class="player-details">
                        <span class="player-name-text" id="xName">Spieler X</span>
                        <span class="player-score-num" id="xScore">0</span>
                    </div>
                </div>
                <div class="score-center">
                    <span class="vs-text">UNENTSCHIEDEN</span>
                    <span class="draws-num" id="drawsScore">0</span>
                </div>
                <div class="player-score o-player">
                    <div class="player-details">
                        <span class="player-name-text" id="oName">Spieler O</span>
                        <span class="player-score-num" id="oScore">0</span>
                    </div>
                    <div class="player-avatar o">O</div>
                </div>
            </div>

            <!-- Spielstatus -->
            <div class="status-banner" id="gameStatus">Bereit</div>

            <!-- Spielbrett -->
            <div class="game-board" id="board"></div>

            <!-- Aktionen -->
            <div class="actions">
                <button class="btn-secondary" onclick="goBack()">Verlassen</button>
                <button class="btn-primary" onclick="resetGame()">Neues Spiel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
